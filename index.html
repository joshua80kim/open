      <p className="mt-5 max-w-3xl text-lg leading-8 text-slate-300">{desc}</p>
    </div>
  );
}

function Celestial3D() {
  const [rot, setRot] = useState({ x: -0.28, y: -0.68 });
  const [drag, setDrag] = useState(false);
  const [last, setLast] = useState({ x: 0, y: 0 });
  const [lat, setLat] = useState(37);
  const [az, setAz] = useState(120);
  const [alt, setAlt] = useState(35);
  const [time, setTime] = useState(0);
  const [play, setPlay] = useState(false);
  const [focus, setFocus] = useState("지평선");
  const [viewHint, setViewHint] = useState(["지평선 기준: 천정 위 / 천저 아래", "북점 오른쪽 / 남점 왼쪽", "서점 아래 / 동점 위쪽"]);
  const [layers, setLayers] = useState({
    horizon: true,
    meridian: true,
    vertical: true,
    equator: true,
    hour: true,
    poles: true,
    vector: true,
    arcs: true,
    labels: true,
    daily: false,
  });

  useEffect(() => {
    if (!play) return;
    const id = setInterval(() => setTime((t) => Math.round(((t + 0.25) % 24) * 100) / 100), 180);
    return () => clearInterval(id);
  }, [play]);

  const R = 188;
  const cx = 280;
  const cy = 274;
  const toRad = (d) => (d * Math.PI) / 180;
  const toDeg = (r) => (r * 180) / Math.PI;
  const add = (a, b) => [a[0] + b[0], a[1] + b[1], a[2] + b[2]];
  const mul = (a, k) => [a[0] * k, a[1] * k, a[2] * k];
  const dot = (a, b) => a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
  const cross = (a, b) => [a[1] * b[2] - a[2] * b[1], a[2] * b[0] - a[0] * b[2], a[0] * b[1] - a[1] * b[0]];
  const norm = (a) => {
    const m = Math.hypot(a[0], a[1], a[2]) || 1;
    return [a[0] / m, a[1] / m, a[2] / m];
  };
  const rotateAxis = (p, axis, ang) => {
    const u = norm(axis);
    return add(add(mul(p, Math.cos(ang)), mul(cross(u, p), Math.sin(ang))), mul(u, dot(u, p) * (1 - Math.cos(ang))));
  };
  const rotate = (p) => {
    const cosy = Math.cos(rot.y), siny = Math.sin(rot.y);
    const cosx = Math.cos(rot.x), sinx = Math.sin(rot.x);
    let x = p[0] * cosy + p[2] * siny;
    let z = -p[0] * siny + p[2] * cosy;
    let y = p[1] * cosx - z * sinx;
    z = p[1] * sinx + z * cosx;
    return [x, y, z];
  };
  const project = (p) => {
    const q = rotate(p);
    return { x: cx + q[0] * R, y: cy - q[1] * R, z: q[2] };
  };
  const circlePts = (u, v, steps = 241) => Array.from({ length: steps }, (_, i) => {
    const t = (i / (steps - 1)) * Math.PI * 2;
    return add(mul(u, Math.cos(t)), mul(v, Math.sin(t)));
  });
  const arcPts = (u, v, start, end, steps = 64) => Array.from({ length: steps }, (_, i) => {
    const t = start + ((end - start) * i) / (steps - 1);
    return add(mul(u, Math.cos(t)), mul(v, Math.sin(t)));
  });
  const pathFor = (arr, front) => {
    let d = "";
    let open = false;
    arr.forEach((p) => {
      const q = project(p);
      const visible = front ? q.z >= -0.02 : q.z < -0.02;
      if (!visible) {
        open = false;
        return;
      }
      d += `${open ? "L" : "M"}${q.x.toFixed(1)},${q.y.toFixed(1)} `;
      open = true;
    });
    return d;
  };

  const phi = toRad(lat);
  const baseAz = toRad(az);
  const baseAlt = toRad(alt);
  const baseStar = [Math.sin(baseAz) * Math.cos(baseAlt), Math.sin(baseAlt), Math.cos(baseAz) * Math.cos(baseAlt)];
  const zenith = [0, 1, 0];
  const nadir = [0, -1, 0];
  const north = [0, 0, 1];
  const south = [0, 0, -1];
  const east = [1, 0, 0];
  const west = [-1, 0, 0];
  const ncp = [0, Math.sin(phi), Math.cos(phi)];
  const scp = [0, -Math.sin(phi), -Math.cos(phi)];
  const star = layers.daily ? norm(rotateAxis(baseStar, ncp, -toRad(time * 15))) : baseStar;
  const horizontal = norm([star[0], 0, star[2]]);
  const shownAlt = Math.round(toDeg(Math.asin(clamp(star[1], -1, 1))) * 10) / 10;
  const shownAz = Math.round(((toDeg(Math.atan2(star[0], star[2])) + 360) % 360) * 10) / 10;
  const zenithDistance = Math.round((90 - shownAlt) * 10) / 10;
  const dec = Math.round(toDeg(Math.asin(clamp(dot(star, ncp), -1, 1))) * 10) / 10;

  const equatorU = [1, 0, 0];
  const equatorV = norm(cross(ncp, equatorU));
  const hourNormal = norm(cross(ncp, star));
  const hourU = norm(ncp);
  const hourV = norm(cross(hourNormal, hourU));
  const verticalU = norm(star);
  const verticalV = norm(cross(cross(zenith, star), verticalU));
  const meridianU = [0, 1, 0];
  const meridianV = [0, 0, 1];

  const pStar = project(star);
  const pZenith = project(zenith);
  const pNadir = project(nadir);
  const pNorth = project(north);
  const pSouth = project(south);
  const pEast = project(east);
  const pWest = project(west);
  const pNcp = project(ncp);
  const pScp = project(scp);

  const info = {
    지평선: "지평면을 연장했을 때 천구와 만나는 큰 원. 방위각은 이 선 위에서 잰다.",
    자오선: "천정, 천저, 천구의 북극, 천구의 남극을 지나는 큰 원. 남중과 관련된다.",
    수직권: "천정과 천저를 지나며 별을 포함하는 큰 원. 고도와 천정거리를 읽는 데 사용한다.",
    천구의적도: "지구의 적도를 천구까지 연장한 큰 원. 적도좌표계의 기준선이다.",
    시간권: "천구의 북극과 남극을 지나며 별을 포함하는 큰 원. 적경·적위 해석에 사용한다.",
    각도표시: "A는 방위각, h는 고도, z는 천정거리, δ는 적위이다.",
    일주운동: "시간을 움직이면 별이 천구의 북극을 중심으로 회전한다. 1시간에 15°씩 움직인다.",
  };

  const toggle = (key) => setLayers((v) => ({ ...v, [key]: !v[key] }));
  const setPreset = (name) => {
    if (name === "전체") setLayers({ horizon: true, meridian: true, vertical: true, equator: true, hour: true, poles: true, vector: true, arcs: true, labels: true, daily: false });
    if (name === "지평") setLayers({ horizon: true, meridian: true, vertical: true, equator: false, hour: false, poles: true, vector: true, arcs: true, labels: true, daily: false });
    if (name === "적도") setLayers({ horizon: false, meridian: true, vertical: false, equator: true, hour: true, poles: true, vector: true, arcs: true, labels: true, daily: false });
    if (name === "일주") setLayers({ horizon: true, meridian: false, vertical: false, equator: true, hour: true, poles: true, vector: true, arcs: false, labels: true, daily: true });
  };
  const setView = (name) => {
    if (name === "기본") {
      setRot({ x: -0.28, y: -0.68 });
      setViewHint(["드래그해서 회전", "앞쪽 선: 진하게 / 뒤쪽 선: 흐리게", "A 방위각 · h 고도 · z 천정거리"]);
    }
    if (name === "위") {
      setRot({ x: -1.25, y: -0.68 });
      setViewHint(["위에서 보기", "천구의 원들이 평면적으로 보임", "방위각 방향 확인에 적합"]);
    }
    if (name === "북") {
      setRot({ x: -0.15, y: 0 });
      setViewHint(["북쪽 기준 보기", "천구의 북극 방향 확인", "일주운동 중심 확인"]);
    }
    if (name === "남") {
      setRot({ x: -0.15, y: Math.PI });
      setViewHint(["남쪽 기준 보기", "남점과 자오선 확인", "남중 방향 확인"]);
    }
    if (name === "지평선 기준") {
      setRot({ x: 0.38, y: Math.PI / 2 });
      setLayers({ horizon: true, meridian: true, vertical: true, equator: false, hour: false, poles: true, vector: true, arcs: true, labels: true, daily: false });
      setFocus("지평선");
      setViewHint(["지평선 기준: 천정 위 / 천저 아래", "북점 오른쪽 / 남점 왼쪽", "서점 아래 / 동점 위쪽"]);
    }
    if (name === "적도 기준") {
      setRot({ x: phi - 1.2, y: 0 });
      setLayers({ horizon: false, meridian: true, vertical: false, equator: true, hour: true, poles: true, vector: true, arcs: true, labels: true, daily: false });
      setFocus("천구의적도");
      setViewHint(["적도 기준: 천구의 북극 위", "천구의 남극 아래", "천구의 적도는 가운데 타원"]);
    }
  };

  const startDrag = (e) => {
    setDrag(true);
    setLast({ x: e.clientX, y: e.clientY });
    e.currentTarget.setPointerCapture?.(e.pointerId);
  };
  const moveDrag = (e) => {
    if (!drag) return;
    const dx = e.clientX - last.x;
    const dy = e.clientY - last.y;
    setRot((r) => ({ x: clamp(r.x + dy * 0.01, -1.35, 1.35), y: r.y + dx * 0.01 }));
    setLast({ x: e.clientX, y: e.clientY });
  };

  const DrawCircle = ({ on, u, v, color, width = 3, dash = "", name }) => {
    if (!on) return null;
    const arr = circlePts(u, v);
    return (
      <g onClick={() => name && setFocus(name)} className="cursor-pointer">
        <path d={pathFor(arr, false)} fill="none" stroke={color} strokeWidth={width * 0.62} strokeDasharray={dash || "7 9"} opacity="0.24" />
        <path d={pathFor(arr, true)} fill="none" stroke={color} strokeWidth={width} strokeDasharray={dash} opacity="0.96" />
      </g>
    );
  };
  const DrawArc = ({ on, arr, color, label }) => {
    if (!on) return null;
    const mid = project(arr[Math.floor(arr.length / 2)]);
    return (
      <g onClick={() => setFocus("각도표시")} className="cursor-pointer">
        <path d={pathFor(arr, false)} fill="none" stroke={color} strokeWidth="3" strokeDasharray="4 7" opacity="0.25" />
        <path d={pathFor(arr, true)} fill="none" stroke={color} strokeWidth="4.5" strokeLinecap="round" opacity="0.96" />
        {layers.labels && <text x={mid.x + 7} y={mid.y - 7} fontSize="18" fontWeight="900" fill={color}>{label}</text>}
      </g>
    );
  };
  const Label = ({ p, children, color = "#fff", dx = 10, dy = -10 }) => {
    if (!layers.labels) return null;
    const q = project(p);
    return <text x={clamp(q.x + dx, 18, 478)} y={clamp(q.y + dy, 25, 540)} fontSize="15" fontWeight="900" fill={color} opacity={q.z < -0.02 ? 0.45 : 1}>{children}</text>;
  };
  const Point = ({ p, color, r = 6 }) => {
    const q = project(p);
    return <circle cx={q.x} cy={q.y} r={r} fill={color} opacity={q.z < -0.02 ? 0.45 : 1} stroke="#fff" strokeWidth={q.z < -0.02 ? 0 : 1.5} />;
  };

  const azArc = arcPts(north, east, 0, toRad(shownAz), 70);
  const altArc = arcPts(horizontal, zenith, 0, toRad(shownAlt), 55);
  const zdArc = arcPts(horizontal, zenith, toRad(shownAlt), Math.PI / 2, 55);
  const decFootRaw = add(star, mul(ncp, -dot(star, ncp)));
  const decFoot = norm(Math.hypot(decFootRaw[0], decFootRaw[1], decFootRaw[2]) < 0.001 ? equatorU : decFootRaw);
  const decArc = arcPts(decFoot, ncp, 0, toRad(dec), 55);

  return (
    <div>
      <Title icon="🛰️" eyebrow="3D 천구" title="회전하며 좌표계 확인" desc="드래그 회전, 개별 표시, 각도 호, 일주운동을 한 화면에서 조절한다." />
      <div className="grid gap-6 lg:grid-cols-[1.25fr_.75fr]">
        <Glass>
          <svg onPointerDown={startDrag} onPointerMove={moveDrag} onPointerUp={() => setDrag(false)} onPointerLeave={() => setDrag(false)} viewBox="0 0 560 590" className="h-auto w-full cursor-grab rounded-[1.5rem] bg-gradient-to-b from-slate-950 via-sky-950 to-slate-950 active:cursor-grabbing">
            <defs>
              <radialGradient id="sphere3d" cx="42%" cy="32%" r="72%">
                <stop offset="0%" stopColor="#7dd3fc" stopOpacity="0.55" />
                <stop offset="58%" stopColor="#1e3a8a" stopOpacity="0.34" />
                <stop offset="100%" stopColor="#020617" stopOpacity="0.08" />
              </radialGradient>
            </defs>
            {Array.from({ length: 72 }).map((_, i) => <circle key={i} cx={(i * 71) % 560} cy={(i * 43) % 205} r={(i % 3) + 0.7} fill="white" opacity={0.15 + (i % 4) * 0.08} />)}
            <circle cx={cx} cy={cy} r={R} fill="url(#sphere3d)" stroke="#e0f2fe" strokeWidth="3" opacity="0.96" />
            <circle cx={cx} cy={cy} r={R} fill="none" stroke="#ffffff" strokeWidth="1.5" opacity="0.25" />

            <DrawCircle on={layers.horizon} u={east} v={north} color="#f8fafc" width={3.2} name="지평선" />
            <DrawCircle on={layers.meridian} u={meridianU} v={meridianV} color="#fb923c" width={2.8} dash="10 8" name="자오선" />
            <DrawCircle on={layers.vertical} u={verticalU} v={verticalV} color="#fde047" width={3.2} name="수직권" />
            <DrawCircle on={layers.equator} u={equatorU} v={equatorV} color="#38bdf8" width={3.2} name="천구의적도" />
            <DrawCircle on={layers.hour} u={hourU} v={hourV} color="#c084fc" width={2.9} dash="9 8" name="시간권" />
            {layers.daily && <DrawCircle on u={ncp} v={norm(cross(ncp, baseStar))} color="#a3e635" width={2.5} dash="5 7" name="일주운동" />}

            <DrawArc on={layers.arcs} arr={azArc} color="#facc15" label="A" />
            <DrawArc on={layers.arcs} arr={altArc} color="#22d3ee" label="h" />
            <DrawArc on={layers.arcs} arr={zdArc} color="#fb7185" label="z" />
            <DrawArc on={layers.arcs && layers.equator} arr={decArc} color="#a78bfa" label="δ" />

            {layers.poles && <line x1={pNcp.x} y1={pNcp.y} x2={pScp.x} y2={pScp.y} stroke="#67e8f9" strokeWidth="2.2" strokeDasharray="8 8" opacity="0.8" />}
            <line x1={pZenith.x} y1={pZenith.y} x2={pNadir.x} y2={pNadir.y} stroke="#f8fafc" strokeWidth="1.6" strokeDasharray="7 8" opacity="0.7" />
            {layers.vector && <line x1={cx} y1={cy} x2={pStar.x} y2={pStar.y} stroke="#fde047" strokeWidth="4.2" opacity="0.95" />}

            <circle cx={cx} cy={cy} r="12" fill="#f8fafc" />
            <Point p={star} color="#fbbf24" r={11} />
            <Point p={zenith} color="#ffffff" r={6} />
            <Point p={nadir} color="#94a3b8" r={5} />
            <Point p={north} color="#dbeafe" r={6} />
            <Point p={south} color="#dbeafe" r={6} />
            <Point p={east} color="#dbeafe" r={5} />
            <Point p={west} color="#dbeafe" r={5} />
            {layers.poles && <Point p={ncp} color="#67e8f9" r={7} />}
            {layers.poles && <Point p={scp} color="#67e8f9" r={6} />}

            <Label p={star} color="#fde68a">별</Label>
            <Label p={zenith}>천정</Label>
            <Label p={nadir} color="#cbd5e1" dy={22}>천저</Label>
            <Label p={north} color="#dbeafe">북점</Label>
            <Label p={south} color="#dbeafe">남점</Label>
            <Label p={east} color="#dbeafe">동점</Label>
            <Label p={west} color="#dbeafe">서점</Label>
            {layers.poles && <Label p={ncp} color="#a5f3fc">천구의 북극</Label>}

            <rect x="22" y="22" width="242" height="116" rx="18" fill="#020617" opacity="0.72" />
            <text x="42" y="52" fontSize="16" fontWeight="900" fill="#f8fafc">드래그해서 회전</text>

            <text x="42" y="128" fontSize="14" fontWeight="800" fill="#cbd5e1">{viewHint[2]}</text>

            <rect x="22" y="505" width="515" height="52" rx="16" fill="#020617" opacity="0.7" />
            <text x="42" y="538" fontSize="16" fontWeight="900" fill="#e2e8f0">{info[focus]}</text>
          </svg>
        </Glass>
        <Glass className="p-6">
          <div className="grid grid-cols-4 gap-2">
            {["전체", "지평", "적도", "일주"].map((label) => (
              <button key={label} onClick={() => setPreset(label)} className="rounded-2xl bg-white/10 px-3 py-3 text-sm font-black hover:bg-white/15">{label}</button>
            ))}
          </div>

}

function Metric({ label, value, hot }) {

function Ecliptic() {
  const months = [
    { name: "춘분", m: "3월", d: 0, note: "낮과 밤의 길이가 비슷하다." },
    { name: "하지", m: "6월", d: 23.5, note: "북반구에서 태양의 남중 고도가 가장 높다." },
    { name: "추분", m: "9월", d: 0, note: "낮과 밤의 길이가 비슷하다." },
    { name: "동지", m: "12월", d: -23.5, note: "북반구에서 태양의 남중 고도가 가장 낮다." },
  ];
  const [idx, setIdx] = useState(0);
  const now = months[idx];
  const a = (idx * 90 - 25) * Math.PI / 180;
  const ex = 280 + Math.cos(a) * 155;
  const ey = 205 + Math.sin(a) * 88;
  return (
    <div>
      <Title icon="☀️" eyebrow="황도와 연주운동" title="황도와 계절별 태양 위치" desc="춘분, 하지, 추분, 동지의 태양 적위와 남중 고도 변화를 확인한다." />
      <div className="grid gap-6 lg:grid-cols-[1.1fr_.9fr]">

          <svg viewBox="0 0 560 420" className="h-auto w-full rounded-[1.5rem] bg-gradient-to-b from-slate-950 to-indigo-950">

            <circle cx="280" cy="205" r="29" fill="#fbbf24" />
            <text x="280" y="212" textAnchor="middle" fontSize="15" fontWeight="900" fill="#7c2d12">태양</text>
            <circle cx={ex} cy={ey} r="15" fill="#e2e8f0" />
            <text x={clamp(ex + 18, 30, 420)} y={clamp(ey - 18, 30, 380)} fontSize="19" fontWeight="900" fill="#fff">{now.m} 지구</text>
            {months.map((m, i) => {
              const aa = (i * 90 - 25) * Math.PI / 180;
              return <text key={m.name} x={280 + Math.cos(aa) * 245} y={205 + Math.sin(aa) * 145} textAnchor="middle" fontSize="18" fontWeight="900" fill={i === idx ? "#fed7aa" : "#94a3b8"}>{m.name}</text>;
            })}
            <text x="280" y="382" textAnchor="middle" fontSize="18" fontWeight="900" fill="#fed7aa">황도 = 천구상에서 태양이 지나가는 길</text>
          </svg>
        </Glass>
        <Glass className="p-6">
          <div className="grid grid-cols-2 gap-2">
            {months.map((m, i) => <button key={m.name} onClick={() => setIdx(i)} className={`rounded-2xl px-4 py-4 text-left font-black ${i === idx ? "bg-orange-300 text-slate-950" : "bg-white/10 text-white hover:bg-white/15"}`}><span className="text-sm opacity-70">{m.m}</span><br />{m.name}</button>)}
          </div>
          <div className="mt-5 rounded-[1.5rem] bg-white p-6 text-slate-950">
            <div className="text-sm font-black text-orange-600">{now.m} · {now.name}</div>
            <div className="mt-2 text-4xl font-black">태양 적위 {now.d > 0 ? "+" : ""}{now.d}°</div>
            <p className="mt-3 text-lg leading-8 text-slate-700">{now.note}</p>
          </div>
        </Glass>
      </div>
    </div>
  );

          </div>
          <div className="mt-4 flex flex-wrap gap-2">
            <button onClick={() => setHint(!hint)} className="rounded-2xl bg-white/10 px-4 py-3 font-black hover:bg-white/15">힌트</button>
            <button onClick={next} className="rounded-2xl bg-white px-4 py-3 font-black text-slate-950">다음 문제</button>
            <button onClick={() => { setIdx(0); setScore(0); setState(null); setAnswer(""); }} className="rounded-2xl bg-white/10 px-4 py-3 font-black hover:bg-white/15">초기화</button>
          </div>
          {hint && <div className="mt-5 rounded-2xl bg-cyan-200/10 p-5 font-bold leading-8 text-cyan-100">힌트: {item.h}</div>}
          {state && <div className={`mt-5 rounded-[1.5rem] p-6 ${state === "ok" ? "bg-emerald-300 text-slate-950" : "bg-rose-300 text-slate-950"}`}>
            <div className="text-2xl font-black">{state === "ok" ? "정답입니다 ✅" : "오답입니다 ❌"}</div>
            <p className="mt-2 text-lg leading-8"><b>해설:</b> {item.e}</p>
            {state === "no" && <p className="mt-2 font-black">정답 예시: {item.a[0]}</p>}
          </div>}
        </Glass>
        <Glass className="p-6">
          <div className="text-2xl font-black">서술형으로 확장하는 틀</div>
          <div className="mt-4 space-y-3">
            {[
              ["1", "용어 정의", "무엇을 뜻하는지 한 문장으로 쓴다."],
              ["2", "기준 제시", "어떤 기준점·기준선에서 재는지 쓴다."],
              ["3", "값/공식", "방위각·고도·적경·적위 또는 공식을 넣는다."],
              ["4", "비교/원인", "시간·장소 변화, 자전·공전 원인을 연결한다."],
            ].map(([n, t, b]) => <div key={n} className="rounded-2xl bg-white/10 p-4"><div className="font-black text-cyan-200">{n}. {t}</div><p className="mt-1 leading-7 text-slate-300">{b}</p></div>)}
          </div>
        </Glass>
      </div>
    </div>
  );
}

function CelestialLearningSite() {
  return <Shell />;
}



const __RootComponent = window.__APP_COMPONENT__ || Shell;
const __root = ReactDOM.createRoot(document.getElementById('root'));
__root.render(<__RootComponent />);

  </script>
